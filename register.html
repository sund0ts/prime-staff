<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Arizona Prime · Регистрация</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#0c0e14;--panel:#11141d;--border:#1c2030;--border-lit:#2a3048;
  --text:#e8ecf4;--muted:#3a4060;--sub:#5a6080;
  --red:#f04060;--blue:#3d7fff;--purple:#8b5cf6;
  --font:'Outfit',sans-serif;
}
body{background:var(--bg);color:var(--text);font-family:var(--font);min-height:100vh;padding:40px 16px}
body::before{content:'';position:fixed;inset:0;z-index:0;pointer-events:none;
  background-image:linear-gradient(var(--border) 1px,transparent 1px),linear-gradient(90deg,var(--border) 1px,transparent 1px);
  background-size:40px 40px;
  mask-image:radial-gradient(ellipse 80% 80% at 50% 50%,#000,transparent);
  -webkit-mask-image:radial-gradient(ellipse 80% 80% at 50% 50%,#000,transparent);
}
.glow{position:fixed;border-radius:50%;filter:blur(120px);pointer-events:none;z-index:0}
.g1{width:500px;height:400px;background:rgba(61,127,255,.07);top:-100px;left:-100px}
.g2{width:400px;height:400px;background:rgba(240,64,96,.06);bottom:0;right:-100px}

.wrap{position:relative;z-index:1;max-width:540px;margin:0 auto}

.header{text-align:center;margin-bottom:28px;animation:up .4s ease}
@keyframes up{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
.logo-icon{width:48px;height:48px;border-radius:13px;background:linear-gradient(135deg,var(--red),var(--purple),var(--blue));display:flex;align-items:center;justify-content:center;margin:0 auto 14px}
.logo-icon svg{width:24px;height:24px;stroke:#fff;stroke-width:1.8}
h1{font-size:22px;font-weight:800;letter-spacing:-.02em;margin-bottom:6px}
.hsub{font-size:13px;color:var(--sub);line-height:1.5}

.card{background:var(--panel);border:1px solid var(--border);border-radius:18px;padding:32px;animation:up .4s ease .05s both}
.block{margin-bottom:24px;padding-bottom:24px;border-bottom:1px solid var(--border)}
.block:last-of-type{border-bottom:none;margin-bottom:0;padding-bottom:0}
.block-title{font-size:10px;font-weight:800;letter-spacing:.1em;text-transform:uppercase;color:var(--red);margin-bottom:16px;display:flex;align-items:center;gap:7px}
.block-title::before{content:'';width:3px;height:13px;background:var(--red);border-radius:2px;display:block}

.grid2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.field{margin-bottom:0}
.field.full{grid-column:1/-1}
.field label{display:block;font-size:11px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;color:var(--muted);margin-bottom:6px}
.req{color:var(--red)}
.ir{position:relative}
.ir svg{position:absolute;left:12px;top:50%;transform:translateY(-50%);width:14px;height:14px;color:var(--muted);pointer-events:none}
input,select,textarea{
  width:100%;background:#0e1120;border:1px solid var(--border);border-radius:9px;
  color:var(--text);font-family:var(--font);font-size:13px;
  padding:10px 12px 10px 36px;outline:none;transition:border-color .2s;
}
input.ni,select,textarea{padding-left:12px}
input:focus,select:focus,textarea:focus{border-color:var(--border-lit)}
input::placeholder,textarea::placeholder{color:var(--muted)}
select option{background:var(--panel)}
textarea{resize:vertical;min-height:60px}
.hint{font-size:11px;color:var(--muted);margin-top:4px}

.err{background:rgba(240,64,96,.08);border:1px solid rgba(240,64,96,.2);border-radius:9px;padding:10px 14px;font-size:13px;color:var(--red);margin-bottom:16px;display:none}

.btn{
  width:100%;padding:13px;border:none;border-radius:10px;
  background:linear-gradient(135deg,var(--red),var(--purple));
  color:#fff;font-family:var(--font);font-size:14px;font-weight:700;
  cursor:pointer;transition:opacity .2s,transform .15s;margin-top:24px;
  display:flex;align-items:center;justify-content:center;gap:8px;
}
.btn:hover{opacity:.88;transform:translateY(-1px)}
.btn:disabled{opacity:.5;pointer-events:none}
.spin{width:15px;height:15px;border:2px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:spin .6s linear infinite;display:none}
@keyframes spin{to{transform:rotate(360deg)}}

.ok{display:none;text-align:center;padding:48px 20px}
.ok svg{margin:0 auto 16px;display:block}
.ok h3{font-size:20px;font-weight:800;margin-bottom:8px}
.ok p{color:var(--sub);font-size:13px;line-height:1.6}
.ok a{color:var(--blue);text-decoration:none;font-weight:600}

.back{display:block;text-align:center;margin-top:18px;font-size:13px;color:var(--muted);text-decoration:none;transition:color .2s;position:relative;z-index:1}
.back:hover{color:var(--sub)}
@media(max-width:480px){.grid2{grid-template-columns:1fr}.field.full{grid-column:auto}}
</style>
</head>
<body>
<div class="glow g1"></div>
<div class="glow g2"></div>

<div class="wrap">
  <div class="header">
    <div class="logo-icon"><svg viewBox="0 0 24 24" fill="none" stroke-linecap="round" stroke-linejoin="round"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg></div>
    <h1>Регистрация сотрудника</h1>
    <p class="hsub">Только для действующих участников Arizona Prime.<br>Не передавай эту ссылку посторонним.</p>
  </div>

  <div class="card">
    <div class="err" id="err"></div>

    <div id="form">
      <div class="block">
        <div class="block-title">Аккаунт</div>
        <div class="grid2">
          <div class="field">
            <label>Никнейм <span class="req">*</span></label>
            <div class="ir">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
              <input id="fNick" type="text" placeholder="Carl_Johnson" autocomplete="off">
            </div>
          </div>
          <div class="field">
            <label>Пароль <span class="req">*</span></label>
            <div class="ir">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
              <input id="fPass" type="password" placeholder="Мин. 6 символов">
            </div>
          </div>
          <div class="field full">
            <label>Реальное имя <span class="req">*</span></label>
            <div class="ir">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/></svg>
              <input id="fName" type="text" placeholder="Иван Иванов">
            </div>
          </div>
        </div>
      </div>

      <div class="block">
        <div class="block-title">Должность</div>
        <div class="grid2">
          <div class="field full">
            <label>Должность <span class="req">*</span></label>
            <div class="ir">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/></svg>
              <input id="fPos" type="text" placeholder="Администратор ивентов">
            </div>
          </div>
          <div class="field">
            <label>Уровень <span class="req">*</span></label>
            <select id="fLevel" class="ni">
              <option value="">— выбрать —</option>
              <option value="1">1 · Академик</option>
              <option value="2">2 · Рыцарь</option>
              <option value="3">3 · Администратор</option>
              <option value="4">4 · Следящий за академией</option>
              <option value="5">5 · Куратор отдела</option>
              <option value="6">6 · Руководитель отдела</option>
              <option value="7">7 · Заместитель Директора</option>
              <option value="8">8 · Директор</option>
            </select>
          </div>
          <div class="field">
            <label>Дата постановления <span class="req">*</span></label>
            <input id="fAppt" type="date" class="ni">
          </div>
          <div class="field">
            <label>Дата последнего повышения</label>
            <input id="fPromo" type="date" class="ni">
          </div>
        </div>
      </div>

      <div class="block">
        <div class="block-title">Соцсети</div>
        <div class="grid2">
          <div class="field">
            <label>Discord</label>
            <div class="ir">
              <svg viewBox="0 0 24 24" fill="currentColor" style="color:var(--muted)"><path d="M20.317 4.37a19.791 19.791 0 0 0-4.885-1.515.074.074 0 0 0-.079.037c-.21.375-.444.864-.608 1.25a18.27 18.27 0 0 0-5.487 0 12.64 12.64 0 0 0-.617-1.25.077.077 0 0 0-.079-.037A19.736 19.736 0 0 0 3.677 4.37a.07.07 0 0 0-.032.027C.533 9.046-.32 13.58.099 18.057a.082.082 0 0 0 .031.054 19.9 19.9 0 0 0 5.993 3.03.078.078 0 0 0 .084-.028c.462-.63.874-1.295 1.226-1.994a.076.076 0 0 0-.041-.106 13.107 13.107 0 0 1-1.872-.892.077.077 0 0 1-.008-.128 10.2 10.2 0 0 0 .372-.292.074.074 0 0 1 .077-.01c3.928 1.793 8.18 1.793 12.062 0a.074.074 0 0 1 .078.01c.12.098.246.198.373.292a.077.077 0 0 1-.006.127 12.299 12.299 0 0 1-1.873.892.077.077 0 0 0-.041.107c.36.698.772 1.362 1.225 1.993a.076.076 0 0 0 .084.028 19.839 19.839 0 0 0 6.002-3.03.077.077 0 0 0 .032-.054c.5-5.177-.838-9.674-3.549-13.66a.061.061 0 0 0-.031-.03zM8.02 15.33c-1.183 0-2.157-1.085-2.157-2.419 0-1.333.956-2.419 2.157-2.419 1.21 0 2.176 1.096 2.157 2.42 0 1.333-.956 2.418-2.157 2.418zm7.975 0c-1.183 0-2.157-1.085-2.157-2.419 0-1.333.955-2.419 2.157-2.419 1.21 0 2.176 1.096 2.157 2.42 0 1.333-.946 2.418-2.157 2.418z"/></svg>
              <input id="fDiscord" type="text" placeholder="username">
            </div>
          </div>
          <div class="field">
            <label>ВКонтакте</label>
            <div class="ir">
              <svg viewBox="0 0 24 24" fill="currentColor" style="color:var(--muted)"><path d="M21.547 7h-3.29a.743.743 0 0 0-.655.392s-1.312 2.416-1.734 3.23C14.734 12.813 14 12.126 14 11.11V7.603A1.104 1.104 0 0 0 12.896 6.5h-2.474a1.982 1.982 0 0 0-1.75.813s1.255-.204 1.255 1.49c0 .42.022 1.626.04 2.64a.73.73 0 0 1-1.272.503 21.54 21.54 0 0 1-2.498-4.543.693.693 0 0 0-.63-.403h-2.99a.508.508 0 0 0-.48.685C3.005 10.175 6.918 18 11.38 18h1.878a.742.742 0 0 0 .742-.742v-1.135a.73.73 0 0 1 1.23-.53l2.247 2.112a1.09 1.09 0 0 0 .816.355h2.309a1.09 1.09 0 0 0 .972-1.587l-1.956-3.415a.73.73 0 0 1 .098-.846l3.83-4.48A.744.744 0 0 0 21.547 7z"/></svg>
              <input id="fVK" type="text" placeholder="https://vk.com/id...">
            </div>
          </div>
        </div>
      </div>

      <button class="btn" id="btnReg" onclick="doReg()">
        <div class="spin" id="spin"></div>
        <span id="btnTxt">Создать аккаунт</span>
      </button>
    </div>

    <div class="ok" id="ok">
      <svg width="56" height="56" viewBox="0 0 24 24" fill="none" stroke="#22c55e" stroke-width="1.6"><circle cx="12" cy="12" r="10"/><polyline points="9 12 11 14 15 10"/></svg>
      <h3>Аккаунт создан!</h3>
      <p>Добро пожаловать в Arizona Prime.<br>Теперь ты можешь <a href="index.html">войти в систему</a>.</p>
    </div>
  </div>
  <a href="index.html" class="back">← Вернуться ко входу</a>
</div>

<script>
const SB  = 'https://mnzayheqmplwgcpgapwn.supabase.co/rest/v1';
const KEY = 'sb_publishable_taiYP-OlMMOXB4NYIpgKOQ_7JLaUPpU';

async function api(path,method,body){
  const opts={method:method||'GET',headers:{apikey:KEY,'Authorization':'Bearer '+KEY,'Content-Type':'application/json','Prefer':'return=representation'}};
  if(body)opts.body=JSON.stringify(body);
  const r=await fetch(SB+path,opts);
  const t=await r.text();
  if(!r.ok)throw new Error(t);
  return t?JSON.parse(t):[];
}

function err(m){const e=document.getElementById('err');e.textContent=m;e.style.display='block';window.scrollTo({top:0,behavior:'smooth'})}

async function doReg(){
  document.getElementById('err').style.display='none';
  const nick =document.getElementById('fNick').value.trim();
  const pass =document.getElementById('fPass').value;
  const name =document.getElementById('fName').value.trim();
  const pos  =document.getElementById('fPos').value.trim();
  const level=parseInt(document.getElementById('fLevel').value)||0;
  const appt =document.getElementById('fAppt').value;
  const promo=document.getElementById('fPromo').value;
  const disc =document.getElementById('fDiscord').value.trim();
  const vk   =document.getElementById('fVK').value.trim();

  if(!nick)return err('Укажи никнейм');
  if(!pass||pass.length<6)return err('Пароль минимум 6 символов');
  if(!name)return err('Укажи реальное имя');
  if(!pos)return err('Укажи должность');
  if(!level)return err('Выбери уровень');
  if(!appt)return err('Укажи дату постановления');

  setBusy(true);
  try{
    const exist=await api('/users?select=id&nickname=eq.'+encodeURIComponent(nick));
    if(exist.length){setBusy(false);return err('Этот никнейм уже занят');}

    await api('/users','POST',{
      nickname:nick,password:pass,real_name:name,
      position:pos,level:level,
      appointment_date:appt,
      last_promotion_date:promo||appt,
      discord:disc||null,vk_url:vk||null,
      avatar:null,is_inactive:false,warnings:0,reprimands:0
    });
    document.getElementById('form').style.display='none';
    document.getElementById('ok').style.display='block';
  }catch(e){setBusy(false);err('Ошибка: '+e.message);}
}

function setBusy(b){
  document.getElementById('btnReg').disabled=b;
  document.getElementById('spin').style.display=b?'block':'none';
  document.getElementById('btnTxt').textContent=b?'Сохранение...':'Создать аккаунт';
}
</script>
</body>
</html>
