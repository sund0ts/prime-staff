<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Arizona Prime · Вход</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#0c0e14;
  --panel:#11141d;
  --border:#1c2030;
  --border-lit:#2a3048;
  --text:#e8ecf4;
  --muted:#3a4060;
  --sub:#5a6080;
  --red:#f04060;
  --blue:#3d7fff;
  --purple:#8b5cf6;
  --cyan:#22d3ee;
  --font:'Outfit',sans-serif;
  --mono:'JetBrains Mono',monospace;
}
html,body{height:100%;overflow:hidden}
body{
  background:var(--bg);
  color:var(--text);
  font-family:var(--font);
  display:flex;align-items:center;justify-content:center;
}

/* BG */
.bg{position:fixed;inset:0;z-index:0;overflow:hidden}
.bg-grid{
  position:absolute;inset:0;
  background-image:
    linear-gradient(var(--border) 1px,transparent 1px),
    linear-gradient(90deg,var(--border) 1px,transparent 1px);
  background-size:40px 40px;
  mask-image:radial-gradient(ellipse 70% 70% at 50% 50%,#000 0%,transparent 100%);
  -webkit-mask-image:radial-gradient(ellipse 70% 70% at 50% 50%,#000 0%,transparent 100%);
}
.bg-glow{position:absolute;border-radius:50%;filter:blur(120px);pointer-events:none}
.g1{width:600px;height:400px;background:rgba(61,127,255,.07);top:-100px;left:-150px}
.g2{width:500px;height:500px;background:rgba(240,64,96,.06);bottom:-100px;right:-100px}
.g3{width:300px;height:300px;background:rgba(139,92,246,.05);top:50%;left:50%;transform:translate(-50%,-50%)}

/* CARD */
.wrap{position:relative;z-index:1;width:100%;max-width:400px;padding:16px}
.card{
  background:var(--panel);
  border:1px solid var(--border);
  border-radius:20px;
  padding:40px 36px;
  animation:up .5s cubic-bezier(.22,1,.36,1);
}
@keyframes up{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}

.logo{display:flex;align-items:center;gap:12px;margin-bottom:32px}
.logo-icon{
  width:44px;height:44px;border-radius:12px;
  background:linear-gradient(135deg,var(--red),var(--purple),var(--blue));
  display:flex;align-items:center;justify-content:center;flex-shrink:0
}
.logo-icon svg{width:22px;height:22px;stroke:#fff}
.logo-text{flex:1}
.logo-name{font-size:17px;font-weight:800;letter-spacing:-.02em;line-height:1}
.logo-sub{font-size:11px;color:var(--sub);letter-spacing:.06em;text-transform:uppercase;margin-top:3px}

.err{
  background:rgba(240,64,96,.08);
  border:1px solid rgba(240,64,96,.2);
  border-radius:10px;
  padding:10px 14px;
  font-size:13px;color:var(--red);
  margin-bottom:16px;display:none;
}

.field{margin-bottom:14px}
.field label{display:block;font-size:11px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);margin-bottom:6px}
.input-row{position:relative}
.input-row svg{position:absolute;left:13px;top:50%;transform:translateY(-50%);width:15px;height:15px;color:var(--muted);pointer-events:none;flex-shrink:0}
input{
  width:100%;background:#0e1120;
  border:1px solid var(--border);border-radius:10px;
  color:var(--text);font-family:var(--font);font-size:14px;
  padding:11px 13px 11px 40px;
  outline:none;transition:border-color .2s;
}
input:focus{border-color:var(--border-lit)}
input::placeholder{color:var(--muted)}

.rem{display:flex;align-items:center;gap:10px;margin:18px 0;cursor:pointer;user-select:none}
.rem-box{
  width:18px;height:18px;border-radius:5px;
  border:1px solid var(--border-lit);background:#0e1120;
  display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .15s;
}
.rem-box.on{background:var(--red);border-color:var(--red)}
.rem-box svg{display:none;width:10px;height:10px;stroke:#fff;stroke-width:2.5}
.rem-box.on svg{display:block}
.rem span{font-size:13px;color:var(--sub)}
.rem:hover .rem-box{border-color:var(--sub)}

.btn{
  width:100%;padding:13px;border:none;border-radius:10px;
  background:linear-gradient(135deg,var(--red),var(--purple));
  color:#fff;font-family:var(--font);font-size:15px;font-weight:700;
  cursor:pointer;transition:opacity .2s,transform .15s;
  display:flex;align-items:center;justify-content:center;gap:8px;
}
.btn:hover{opacity:.88;transform:translateY(-1px)}
.btn:active{transform:translateY(0)}
.btn:disabled{opacity:.5;pointer-events:none}

.spin{width:16px;height:16px;border:2px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:spin .6s linear infinite;display:none}
@keyframes spin{to{transform:rotate(360deg)}}

.foot{text-align:center;margin-top:20px;font-size:11px;color:var(--muted);font-family:var(--mono)}
</style>
</head>
<body>
<div class="bg">
  <div class="bg-grid"></div>
  <div class="bg-glow g1"></div>
  <div class="bg-glow g2"></div>
  <div class="bg-glow g3"></div>
</div>

<div class="wrap">
  <div class="card">
    <div class="logo">
      <div class="logo-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/>
        </svg>
      </div>
      <div class="logo-text">
        <div class="logo-name">Arizona Prime</div>
        <div class="logo-sub">Staff Portal</div>
      </div>
    </div>

    <div class="err" id="err">Неверный никнейм или пароль</div>

    <div class="field">
      <label>Никнейм</label>
      <div class="input-row">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
        <input id="inNick" type="text" placeholder="Твой никнейм" autocomplete="off" spellcheck="false">
      </div>
    </div>

    <div class="field">
      <label>Пароль</label>
      <div class="input-row">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
        <input id="inPass" type="password" placeholder="••••••••">
      </div>
    </div>

    <div class="rem" onclick="toggleRem()">
      <div class="rem-box" id="remBox">
        <svg viewBox="0 0 12 10" fill="none"><polyline points="1 5 4.5 8.5 11 1" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </div>
      <span>Запомнить меня · 30 дней</span>
    </div>

    <button class="btn" id="btnLogin" onclick="doLogin()">
      <div class="spin" id="spin"></div>
      <span id="btnTxt">Войти</span>
    </button>
  </div>
  <div class="foot">arizona-prime.staff · v3.0</div>
</div>

<script>
const SB   = 'https://mnzayheqmplwgcpgapwn.supabase.co/rest/v1';
const KEY  = 'sb_publishable_taiYP-OlMMOXB4NYIpgKOQ_7JLaUPpU';
const SESS = 'aps3';
const D30  = 30*24*60*60*1000;
let rem = false;

function toggleRem(){
  rem=!rem;
  document.getElementById('remBox').classList.toggle('on',rem);
}

async function api(path){
  const r=await fetch(SB+path,{headers:{apikey:KEY,'Authorization':'Bearer '+KEY}});
  const t=await r.text();
  if(!r.ok) throw new Error(t);
  return t?JSON.parse(t):[];
}

async function getIP(){
  try{const r=await fetch('https://api.ipify.org?format=json');return(await r.json()).ip||'?'}catch{return'?'}
}

async function doLogin(){
  const nick=document.getElementById('inNick').value.trim();
  const pass=document.getElementById('inPass').value;
  if(!nick||!pass){showErr('Заполни все поля');return}

  setBusy(true);
  document.getElementById('err').style.display='none';

  try{
    let user=null;
    // Встроенный dev
    if(nick==='falcone'&&pass==='falcone20110403'){
      user={id:'__dev__',nickname:'falcone',real_name:'Developer',position:'Разработчик',level:9,
            warnings:0,reprimands:0,is_inactive:false,appointment_date:null,last_promotion_date:null,
            discord:null,vk_url:null,avatar:null,_dev:true};
    } else {
      const rows=await api('/users?select=*&nickname=eq.'+encodeURIComponent(nick)+'&password=eq.'+encodeURIComponent(pass));
      if(rows.length) user=rows[0];
    }

    if(!user){showErr('Неверный никнейм или пароль');setBusy(false);return}

    const sess={user,saved:Date.now()};
    if(rem){sess.ip=await getIP();sess.expires=Date.now()+D30;localStorage.setItem(SESS,JSON.stringify(sess));}
    else{sessionStorage.setItem(SESS,JSON.stringify(sess));}

    window.location.href='dashboard.html';
  }catch(e){showErr('Ошибка: '+e.message);setBusy(false);}
}

function showErr(m){const el=document.getElementById('err');el.textContent=m;el.style.display='block'}
function setBusy(b){
  document.getElementById('btnLogin').disabled=b;
  document.getElementById('spin').style.display=b?'block':'none';
  document.getElementById('btnTxt').textContent=b?'Вход...':'Войти';
}

async function checkSess(){
  const raw=localStorage.getItem(SESS)||sessionStorage.getItem(SESS);
  if(!raw)return;
  try{
    const s=JSON.parse(raw);
    if(s.expires&&Date.now()>s.expires){localStorage.removeItem(SESS);return;}
    if(s.ip&&s.ip!=='?'){
      const ip=await getIP();
      if(ip!=='?'&&ip!==s.ip){localStorage.removeItem(SESS);return;}
    }
    window.location.href='dashboard.html';
  }catch{localStorage.removeItem(SESS);}
}

document.getElementById('inNick').addEventListener('keydown',e=>{if(e.key==='Enter')document.getElementById('inPass').focus()});
document.getElementById('inPass').addEventListener('keydown',e=>{if(e.key==='Enter')doLogin()});
checkSess();
</script>
</body>
</html>
